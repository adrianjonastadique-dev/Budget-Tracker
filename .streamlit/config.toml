[theme]
# The main accent color (used for buttons, active tabs, and sliders)
# We are using a crisp, retro LCD green here.
primaryColor = "#00E676" 

# The main background color (deep, matte black)
backgroundColor = "#0E1117" 

# The background for the sidebar and expander boxes 
# (Slightly lighter to mimic raised calculator panels/buttons)
secondaryBackgroundColor = "#1A1C23" 

# The main text color (crisp off-white for high contrast readability)
textColor = "#E8EAED" 

# The font style (Crucial for the calculator look and perfect number alignment)
font = "monospace"
